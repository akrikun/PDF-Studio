<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Studio — Admin</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/dashboard" class="btn btn-sm btn-ghost">&larr; Dashboard</a>
            <span>Admin Panel</span>
        </div>
        <div class="nav-actions">
            <span class="nav-user">{{.User.Email}} <span class="badge badge-admin">admin</span></span>
            <button onclick="logout()" class="btn btn-sm btn-ghost">Logout</button>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h2>User Management</h2>
            <button onclick="showCreateUser()" class="btn btn-primary">+ Create User</button>
        </div>

        <div id="usersList" class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Active</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersBody">
                    <tr><td colspan="5">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Create/Edit User Modal -->
        <div id="userModal" class="modal hidden">
            <div class="modal-overlay" onclick="closeModal()"></div>
            <div class="modal-content modal-sm">
                <div class="modal-header">
                    <h3 id="userModalTitle">Create User</h3>
                    <button onclick="closeModal()" class="btn-close">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <input type="hidden" id="editUserId">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="userEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Password <span id="pwdHint" class="muted"></span></label>
                            <input type="password" id="userPassword">
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select id="userRole">
                                <option value="viewer">Viewer</option>
                                <option value="editor">Editor</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="form-group" id="activeGroup" style="display:none">
                            <label>
                                <input type="checkbox" id="userActive" checked> Active
                            </label>
                        </div>
                        <div id="userError" class="error-msg hidden"></div>
                        <button type="submit" class="btn btn-primary btn-full">Save</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast hidden"></div>

    <script>
        function toast(msg, type = 'info') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast toast-' + type;
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        async function api(url, opts = {}) {
            const resp = await fetch(url, {
                ...opts,
                headers: {'Content-Type': 'application/json', ...opts.headers}
            });
            if (resp.status === 401) { window.location.href = '/login'; return null; }
            return resp;
        }

        async function logout() {
            await fetch('/auth/logout', {method: 'POST'});
            window.location.href = '/login';
        }

        async function loadUsers() {
            const resp = await api('/admin/users');
            const users = await resp.json();
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.email}</td>
                    <td><span class="badge badge-${u.role}">${u.role}</span></td>
                    <td>${u.active ? '<span class="badge badge-active">Yes</span>' : '<span class="badge badge-inactive">No</span>'}</td>
                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    <td>
                        <button onclick="editUser('${u.id}')" class="btn btn-sm btn-outline">Edit</button>
                        ${u.active
                            ? `<button onclick="toggleUser('${u.id}', false)" class="btn btn-sm btn-danger">Deactivate</button>`
                            : `<button onclick="toggleUser('${u.id}', true)" class="btn btn-sm btn-outline">Activate</button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        function closeModal() {
            document.getElementById('userModal').classList.add('hidden');
        }

        function showCreateUser() {
            document.getElementById('userModalTitle').textContent = 'Create User';
            document.getElementById('editUserId').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userRole').value = 'viewer';
            document.getElementById('pwdHint').textContent = '(required)';
            document.getElementById('activeGroup').style.display = 'none';
            document.getElementById('userError').classList.add('hidden');
            document.getElementById('userModal').classList.remove('hidden');
        }

        async function editUser(id) {
            const resp = await api(`/admin/users/${id}`);
            const user = await resp.json();
            document.getElementById('userModalTitle').textContent = 'Edit User';
            document.getElementById('editUserId').value = user.id;
            document.getElementById('userEmail').value = user.email;
            document.getElementById('userPassword').value = '';
            document.getElementById('userRole').value = user.role;
            document.getElementById('userActive').checked = user.active;
            document.getElementById('pwdHint').textContent = '(leave blank to keep)';
            document.getElementById('activeGroup').style.display = 'block';
            document.getElementById('userError').classList.add('hidden');
            document.getElementById('userModal').classList.remove('hidden');
        }

        async function toggleUser(id, active) {
            const resp = await api(`/admin/users/${id}`, {
                method: 'PUT',
                body: JSON.stringify({active})
            });
            if (resp && !resp.ok) {
                const data = await resp.json();
                toast(data.error || 'Operation failed', 'error');
                return;
            }
            toast(active ? 'User activated' : 'User deactivated', 'success');
            loadUsers();
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('userError');
            errEl.classList.add('hidden');

            const id = document.getElementById('editUserId').value;
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;
            const role = document.getElementById('userRole').value;

            if (!id) {
                // Create
                if (!password) {
                    errEl.textContent = 'Password is required for new users';
                    errEl.classList.remove('hidden');
                    return;
                }
                const resp = await api('/admin/users', {
                    method: 'POST',
                    body: JSON.stringify({email, password, role})
                });
                if (!resp.ok) {
                    const data = await resp.json();
                    errEl.textContent = data.error;
                    errEl.classList.remove('hidden');
                    return;
                }
            } else {
                // Update
                const body = {email, role};
                if (password) body.password = password;
                body.active = document.getElementById('userActive').checked;
                const resp = await api(`/admin/users/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify(body)
                });
                if (!resp.ok) {
                    const data = await resp.json();
                    errEl.textContent = data.error;
                    errEl.classList.remove('hidden');
                    return;
                }
            }

            closeModal();
            loadUsers();
        });

        loadUsers();
    </script>
</body>
</html>
